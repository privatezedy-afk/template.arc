<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register | ArcLight Capitals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#050810;--deep:#080d18;--surface:#0d1526;--card:#111f35;--card-alt:#0f1a2e;
  --border-1:rgba(99,140,200,0.15);--border-2:rgba(99,140,200,0.25);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.14);--blue-glow:rgba(59,130,246,0.06);
  --emerald:#10b981;
  --white:#f1f5f9;--mid:#8fa3c8;--muted:#4a6080;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r-sm:6px;--r-md:10px;--r-lg:16px;
  --ease:cubic-bezier(0.4,0,0.2,1);
}
body{
  background:var(--void);color:var(--white);font-family:var(--sans);
  font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;
  background-image:radial-gradient(ellipse 70% 80% at 50% 0%, rgba(59,130,246,0.05) 0%, var(--void) 100%);
}
a{text-decoration:none;color:var(--blue);transition:color 0.2s}
a:hover{color:#60a5fa}

/* Layout */
.auth-nav{
  padding:24px 5%;display:flex;align-items:center;justify-content:center;gap:12px;
}
.nav-logo{
  width:42px;height:42px;border-radius:var(--r-sm);
  background:var(--blue-dim);border:1px solid rgba(59,130,246,0.3);
  display:flex;align-items:center;justify-content:center;
}
.nav-name{font-size:18px;font-weight:600;letter-spacing:0.02em;color:var(--white)}

.auth-wrapper{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:2rem 5% 4rem;
}
.auth-card{
  background:var(--card);border:1px solid var(--border-1);
  border-radius:var(--r-lg);width:100%;max-width:520px;
  padding:2.5rem;box-shadow:0 20px 40px rgba(0,0,0,0.4);
  position:relative;overflow:hidden;
}
.auth-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--blue),#06b6d4);
}

/* Header */
.auth-header{text-align:center;margin-bottom:2rem}
.auth-title{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--white);line-height:1.2;margin-bottom:8px}
.auth-sub{font-size:14px;color:var(--mid);font-weight:300}

/* Form Styles */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:0.25rem}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:500;color:var(--mid);letter-spacing:0.02em}
.form-input{
  width:100%;padding:12px 14px;background:var(--deep);
  border:1px solid var(--border-1);border-radius:var(--r-sm);
  color:var(--white);font-family:var(--sans);font-size:14px;
  transition:all 0.2s var(--ease);outline:none;
}
.form-input:hover{border-color:var(--border-2)}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-glow)}
.form-input::placeholder{color:var(--muted)}

/* Checkbox */
.checkbox-group{
  grid-column:1/-1;display:flex;align-items:center;gap:10px;
  margin-top:0.5rem;margin-bottom:0.5rem;cursor:pointer;
}
.checkbox-group input[type="checkbox"] {
  appearance:none;width:18px;height:18px;border-radius:4px;
  background:var(--deep);border:1px solid var(--border-1);
  cursor:pointer;position:relative;transition:all 0.2s;
}
.checkbox-group input[type="checkbox"]:checked {
  background:var(--blue);border-color:var(--blue);
}
.checkbox-group input[type="checkbox"]:checked::after {
  content:'';position:absolute;left:5px;top:2px;width:5px;height:10px;
  border:solid white;border-width:0 2px 2px 0;transform:rotate(45deg);
}
.checkbox-label{font-size:13px;color:var(--mid);user-select:none;cursor:pointer}

/* Button */
.btn-submit{
  grid-column:1/-1;width:100%;padding:14px;border-radius:var(--r-sm);
  background:var(--blue);border:none;margin-top:0.5rem;
  font-size:14px;font-weight:600;color:#fff;font-family:var(--sans);
  cursor:pointer;transition:all 0.25s var(--ease);
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 8px 20px rgba(59,130,246,0.2)}

/* Footer */
.auth-footer{
  text-align:center;margin-top:1.5rem;font-size:13px;color:var(--muted);
}
.secure-badge{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:2rem;padding-top:1.5rem;border-top:1px solid var(--border-1);
  font-size:11px;color:var(--emerald);font-weight:500;text-transform:uppercase;letter-spacing:0.05em;
}

@media(max-width:500px){
  .form-grid{grid-template-columns:1fr}
  .auth-card{padding:2rem 1.5rem}
}
</style>
</head>
<body>

<nav class="auth-nav">
  <div class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 20 20" fill="none"><path d="M10 1.5L18 5.5V14L10 18L2 14V5.5L10 1.5Z" stroke="#3b82f6" stroke-width="1.4" fill="none"/><path d="M10 5.5L14 7.5V11.5L10 13.5L6 11.5V7.5L10 5.5Z" fill="rgba(59,130,246,0.25)" stroke="#3b82f6" stroke-width="1"/><circle cx="10" cy="9.5" r="1.8" fill="#3b82f6"/></svg>
  </div>
  <div class="nav-name">ARCLIGHT CAPITAL VAULT</div>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Create your Account.</h1>
      <p class="auth-sub">Secure registration for institutional and private clients.</p>
    </div>

    <!-- Connected Form matching exact backend requirements -->
    <form method="POST" action="https://www.qfsgeneral-vault.com/register" novalidate="">
      <!-- Hidden CSRF Token -->
      <input type="hidden" name="_token" value="OqZLvxBWM2UGGzbGC4VJOP36TXhohLsDnUrv7ppb" autocomplete="off">

      <div class="form-grid">
        
        <div class="form-group">
          <label class="form-label">First Name</label>
          <input type="text" class="form-input" name="first_name" placeholder="First Name" value="" required="">
        </div>
        
        <div class="form-group">
          <label class="form-label">Last Name</label>
          <input type="text" class="form-input" name="last_name" placeholder="Last Name" value="" required="">
        </div>

        <div class="form-group full">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" name="email" placeholder="Email Address" value="" required="">
        </div>

        <div class="form-group full">
          <label class="form-label">Referral ID</label>
          <input type="text" class="form-input" name="referral_id" value="" placeholder="Referral ID (Optional)">
        </div>

        <div class="form-group">
          <label class="form-label">Choose Password</label>
          <input type="password" class="form-input" name="password" id="password" placeholder="Choose Password" required="">
        </div>

        <div class="form-group">
          <label class="form-label">Repeat Password</label>
          <input type="password" class="form-input" name="password_confirmation" id="password_confirmation" placeholder="Repeat Password" required="">
        </div>

        <label class="checkbox-group" for="terms">
          <input type="checkbox" id="terms" required="">
          <span class="checkbox-label">I agree with the <a href="#">Terms and Conditions</a>.</span>
        </label>

        <button class="btn-submit" type="submit" id="registerbtn">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L13 4V10L7 13L1 10V4L7 1Z" stroke="white" stroke-width="1.3" fill="none"/><circle cx="7" cy="7" r="2" fill="white"/></svg>
          Create Account
        </button>

      </div>
    </form>

    <div class="auth-footer">
      <a href="login.html">Sign In Account</a>
    </div>

    <div class="secure-badge">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L12 3.5V7C12 9.8 9.7 12 7 13C4.3 12 2 9.8 2 7V3.5L7 1Z" stroke="#10b981" stroke-width="1.2" fill="none"/><path d="M4.5 7L6 8.5L9.5 5" stroke="#10b981" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
      AES-256 Encrypted Transmission
    </div>
  </div>
</div>

</body>
</html>
